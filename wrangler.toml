name = "pomodoro"
pages_build_output_dir = "./dist"
compatibility_date = "2026-04-30"
compatibility_flags = [ "nodejs_compat" ]

[vars]
NODE_VERSION = "24.14.1"
BUN_VERSION = "1.3.13"

# ⚡ D1 Database Binding
[[d1_databases]]
binding = "DB"
database_name = "pomodoro-db"
database_id = "896db0a5-ecfc-4f4d-92d2-302a54266f3d"

# 📦 KV Namespace Binding (Cache de Sesiones)
[[kv_namespaces]]
binding = "LUCIA_KV"
id = "2f41dca3b1444beebacd5a4d94284baa"
